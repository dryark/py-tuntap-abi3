name: Python build and publish

on:
  push:
    branches: [ 'master' ]
  pull_request:
    branches: [ 'master' ]
  release:
    types: published

jobs:
  build:
    name: Build wheels (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-2022]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Ensure no committed Wintun DLL payloads
        run: python scripts/check_no_tracked_wintun_dlls.py

      - name: Fetch pinned Wintun release assets
        if: runner.os == 'Windows'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/fetch_wintun_release.py --arches amd64,arm64,x86

      - name: Build wheels
        uses: pypa/cibuildwheel@v2.23.2
        env:
          CIBW_BUILD: "cp38-*"
          CIBW_SKIP: "*-musllinux_*"
          CIBW_ARCHS_LINUX: auto64
          CIBW_ARCHS_MACOS: universal2
          CIBW_ARCHS_WINDOWS: auto64

      - name: Verify wheel tags and contents
        run: python scripts/verify_wheels.py wheelhouse

      - name: Build sdist
        run: |
          python -m pip install --upgrade pip build
          python -m build --sdist

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.os }}-artifacts
          path: |
            wheelhouse/*.whl
            dist/*.tar.gz

  pypi-publish:
    name: Publish release to PyPI
    if: ${{ github.event_name == 'release' }}
    needs: [build]
    runs-on: ubuntu-latest
    environment:
      name: PyPI
      url: https://pypi.org/p/py-tuntap-abi3
    permissions:
      id-token: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - uses: pypa/gh-action-pypi-publish@release/v1